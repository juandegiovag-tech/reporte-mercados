name: Reporte de mercados (cada hora)

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto (UTC)
  workflow_dispatch:        # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generar-y-publicar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      TZ: America/Argentina/Buenos_Aires   # fecha/hora del reporte en horario argentino
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Generar reporte
        run: python generar_reporte.py
      - name: Preparar página
        run: |
          mkdir -p _site
          cp reporte_diario.html _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
